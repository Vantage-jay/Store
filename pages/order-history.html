<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FarmFresh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <style>
        .orders-container {
            max-width: 700px;
            margin: 5rem auto 5rem;
            padding: 1rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title i {
            color: var(--primary);
        }

        .order-card {
            background: white;
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .order-id {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--text);
        }

        .order-date {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .order-status {
            padding: 0.35rem 0.875rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-confirmed {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-delivered {
            background: #dbeafe;
            color: #2563eb;
        }

        .order-items {
            margin-bottom: 1rem;
        }

        .order-item-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed var(--border);
        }

        .order-item-row:last-child {
            border-bottom: none;
        }

        .order-item-row img {
            width: 44px;
            height: 44px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .order-item-name {
            flex: 1;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .order-item-qty {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .order-item-price {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.875rem;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .order-payment {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .order-total {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
        }

        .order-address {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: flex-start;
            gap: 0.4rem;
        }

        .order-address i {
            margin-top: 2px;
            flex-shrink: 0;
            color: var(--primary);
        }

        .empty-orders {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .empty-orders i {
            font-size: 3rem;
            color: var(--border);
            margin-bottom: 1rem;
        }

        .empty-orders h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .empty-orders p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .btn-shop-now {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo-badge"><i class="fas fa-seedling"></i></div>
            <div class="brand-text">
                <span class="brand-name">FarmFresh</span>
                <span class="brand-tag">Premium Farm Produce</span>
            </div>
        </div>
        <a href="profile.html" style="color: var(--text-light); text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 0.4rem;">
            <i class="fas fa-arrow-left"></i> Back to Profile
        </a>
    </nav>

    <main class="orders-container">
        <h1 class="page-title">
            <i class="fas fa-box"></i> My Orders
        </h1>
        <div id="orders-list"></div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="mobile-nav">
        <a href="../index.html" class="mobile-link"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="products.html" class="mobile-link"><i class="fas fa-store"></i><span>Shop</span></a>
        <a href="cart.html" class="mobile-link"><i class="fas fa-shopping-cart"></i><span>Cart</span></a>
        <a href="profile.html" class="mobile-link active"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!auth.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            const container = document.getElementById('orders-list');
            const allOrders = JSON.parse(localStorage.getItem('orders') || '[]');
            const userId = auth.currentUser.id;

            // Show only this user's orders, newest first
            const myOrders = allOrders
                .filter(o => o.user === userId)
                .reverse();

            if (myOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <i class="fas fa-box-open"></i>
                        <h3>No orders yet</h3>
                        <p>You have not placed any orders yet. Start shopping!</p>
                        <a href="products.html" class="btn-shop-now">
                            <i class="fas fa-store"></i> Shop Now
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = myOrders.map(order => {
                const date = new Date(order.date).toLocaleDateString('en-NG', {
                    day: 'numeric', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });

                const statusClass = order.status === 'Delivered' ? 'status-delivered'
                    : order.status === 'Confirmed' ? 'status-confirmed'
                    : 'status-pending';

                const itemsHTML = order.items.map(item => `
                    <div class="order-item-row">
                        <img src="${item.image}" alt="${item.name}"
                            onerror="this.src='https://via.placeholder.com/44'">
                        <span class="order-item-name">${item.name}</span>
                        <span class="order-item-qty">x${item.quantity}</span>
                        <span class="order-item-price">₦${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `).join('');

                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="order-id"><i class="fas fa-hashtag" style="font-size:0.75rem;"></i> ${order.id}</div>
                                <div class="order-date"><i class="fas fa-clock"></i> ${date}</div>
                            </div>
                            <span class="order-status ${statusClass}">${order.status}</span>
                        </div>

                        <div class="order-items">${itemsHTML}</div>

                        <div class="order-address">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${order.delivery?.address || 'Address not saved'}</span>
                        </div>

                        <div class="order-footer">
                            <span class="order-payment">
                                <i class="fas fa-credit-card"></i> ${order.payment}
                            </span>
                            <span class="order-total">₦${order.total.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
