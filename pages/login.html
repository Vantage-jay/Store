<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopEasy</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .auth-tab {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #6b7280;
        }
        
        .auth-tab.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
            margin-bottom: -2px;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .auth-btn {
            width: 100%;
            padding: 0.875rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .auth-btn:active {
            background: #1d4ed8;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #6b7280;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">ShopEasy</div>
        <a href="../index.html">← Back to Home</a>
    </nav>

    <main class="auth-container">
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="showTab('login')">Login</button>
            <button class="auth-tab" onclick="showTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="auth-btn">Login</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" class="auth-form" onsubmit="return handleSignup(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="signup-phone" placeholder="+234 801 234 5678" required>
</div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" required placeholder="Min 6 characters" minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="signup-confirm" required placeholder="••••••••">
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <a href="../index.html" class="back-link">← Continue as Guest</a>
    </main>

    <script src="../js/auth.js"></script>
<script>
    // Tab switching
    function showTab(tab) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tab + '-form').classList.add('active');
    }

    // Handle Login
    function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        
        const result = auth.login(email, password);
        
        if (result && result.status === 'otp_required') {
            sessionStorage.setItem('authType', 'login');
            window.location.href = 'choose-otp.html';
        }
        return false;
    }

    // Handle Sign Up
    function handleSignup(e) {
        e.preventDefault();
        const name = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const confirm = document.getElementById('signup-confirm').value;
        
        if (password !== confirm) {
            alert('Passwords do not match!');
            return false;
        }
        
        // Get phone from new input (add to HTML below)
        const phone = document.getElementById('signup-phone').value;
        
        if (!phone || phone.length < 10) {
            alert('Please enter a valid phone number!');
            return false;
        }
        
        const result = auth.signup(name, email, password, phone);
        
        if (result && result.status === 'otp_required') {
            sessionStorage.setItem('authType', 'signup');
            window.location.href = 'choose-otp.html';
        }
        return false;
    }
</script>
</body>
</html>
