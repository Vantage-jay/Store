<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - ShopEasy</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .otp-container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .otp-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .otp-inputs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0;
        }
        
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .otp-input:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .timer {
            color: #6b7280;
            margin: 1rem 0;
        }
        
        .resend-btn {
            background: none;
            border: none;
            color: #2563eb;
            text-decoration: underline;
            cursor: pointer;
        }
        
        .resend-btn:disabled {
            color: #9ca3af;
            cursor: not-allowed;
            text-decoration: none;
        }
        
        .verify-btn {
            width: 100%;
            padding: 0.875rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .back-btn {
            display: block;
            margin-top: 1rem;
            color: #6b7280;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">ShopEasy</div>
    </nav>

    <main class="otp-container">
        <div class="otp-icon">📱</div>
        <h2>Enter Verification Code</h2>
        <p>We've sent a 6-digit code to your email</p>
        
        <form id="otp-form" onsubmit="return handleVerify(event)">
            <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            </div>
            
            <input type="hidden" id="full-otp" name="otp">
            
            <p class="timer">Code expires in <span id="countdown">10:00</span></p>
            
            <button type="button" class="resend-btn" id="resend-btn" onclick="handleResend()">
                Resend Code
            </button>
            
            <button type="submit" class="verify-btn">Verify & Continue</button>
        </form>
        
        <a href="login.html" class="back-btn">← Back to Login</a>
    </main>

    <script src="../js/auth.js"></script>
<script>
    // Auto-focus and move between inputs
    const inputs = document.querySelectorAll('.otp-input');
    
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length === 1) {
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            }
            const otp = Array.from(inputs).map(i => i.value).join('');
            document.getElementById('full-otp').value = otp;
        });
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });
    
    // Countdown timer
    let timeLeft = 600;
    const countdownEl = document.getElementById('countdown');
    const resendBtn = document.getElementById('resend-btn');
    
    const timer = setInterval(() => {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        countdownEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 0) {
            clearInterval(timer);
            countdownEl.textContent = 'Expired';
            resendBtn.disabled = false;
        }
    }, 1000);
    
    resendBtn.disabled = true;
    setTimeout(() => {
        resendBtn.disabled = false;
    }, 30000);
    
    // Handle verification
    function handleVerify(e) {
        e.preventDefault();
        const otp = document.getElementById('full-otp').value;
        
        if (otp.length !== 6) {
            alert('Please enter all 6 digits');
            return false;
        }
        
        const pendingUser = sessionStorage.getItem('pendingUser');
        const pendingLogin = sessionStorage.getItem('pendingLogin');
        
        let success = false;
        
        if (pendingUser) {
            success = auth.completeSignup(otp);
            if (success) {
                alert('Account created successfully!');
                window.location.href = '../index.html';
            }
        } else if (pendingLogin) {
            success = auth.completeLogin(otp);
            if (success) {
                alert('Login successful!');
                window.location.href = '../index.html';
            }
        } else {
            alert('Session expired. Please start again.');
            window.location.href = 'login.html';
        }
        
        return false;
    }
    
    // Handle resend - go back to choose page
    function handleResend() {
        window.location.href = 'choose-otp.html';
    }
</script>
</body>
</html>
