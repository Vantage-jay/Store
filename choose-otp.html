<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Verification Method - ShopEasy</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .choose-container {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .choose-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .choose-subtitle {
            color: #6b7280;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        
        .method-cards {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .method-card {
            display: flex;
            align-items: center;
            padding: 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        .method-card:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }
        
        .method-card.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }
        
        .method-icon {
            font-size: 2rem;
            margin-right: 1rem;
            width: 50px;
        }
        
        .method-info {
            text-align: left;
            flex: 1;
        }
        
        .method-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #111827;
        }
        
        .method-detail {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }
        
        .method-radio {
            width: 24px;
            height: 24px;
            accent-color: #2563eb;
        }
        
        .continue-btn {
            width: 100%;
            padding: 1rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .continue-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .back-link {
            display: block;
            margin-top: 1rem;
            color: #6b7280;
            text-decoration: none;
        }
        
        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">ShopEasy</div>
    </nav>

    <main class="choose-container">
        <h1 class="choose-title">Verify Your Identity</h1>
        <p class="choose-subtitle">Choose how you want to receive your verification code</p>
        
        <form id="choose-form" onsubmit="return handleChoice(event)">
            <div class="method-cards">
                <!-- SMS Option -->
                <label class="method-card" onclick="selectMethod('sms')">
                    <div class="method-icon">📱</div>
                    <div class="method-info">
                        <div class="method-name">Text Message (SMS)</div>
                        <div class="method-detail" id="sms-detail">We'll send a code to your phone</div>
                    </div>
                    <input type="radio" name="otp-method" value="sms" class="method-radio" required>
                </label>
                
                <!-- Email Option -->
                <label class="method-card" onclick="selectMethod('email')">
                    <div class="method-icon">📧</div>
                    <div class="method-info">
                        <div class="method-name">Email (Gmail)</div>
                        <div class="method-detail" id="email-detail">We'll send a code to your email</div>
                    </div>
                    <input type="radio" name="otp-method" value="email" class="method-radio">
                </label>
            </div>
            
            <button type="submit" class="continue-btn" id="continue-btn" disabled>
                Continue
            </button>
        </form>
        
        <a href="login.html" class="back-link">← Use different account</a>
    </main>

    <script src="../js/auth.js"></script>
    <script>
        // Get stored data from previous step
        const authType = sessionStorage.getItem('authType'); // 'signup' or 'login'
        const userData = JSON.parse(sessionStorage.getItem('pendingUser') || sessionStorage.getItem('pendingLogin') || '{}');
        
        // Update UI with masked contact info
        if (userData.phone) {
            const maskedPhone = userData.phone.slice(-4).padStart(userData.phone.length, '*');
            document.getElementById('sms-detail').textContent = `Send code to: ${maskedPhone}`;
        }
        
        if (userData.email) {
            const emailParts = userData.email.split('@');
            const maskedEmail = emailParts[0].slice(0, 2) + '***@' + emailParts[1];
            document.getElementById('email-detail').textContent = `Send code to: ${maskedEmail}`;
        }
        
        // Handle selection
        function selectMethod(method) {
            document.querySelectorAll('.method-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            event.currentTarget.classList.add('selected');
            event.currentTarget.querySelector('input').checked = true;
            
            document.getElementById('continue-btn').disabled = false;
        }
        
        // Handle form submission
        function handleChoice(e) {
            e.preventDefault();
            
            const method = document.querySelector('input[name="otp-method"]:checked').value;
            
            // Send OTP via chosen method
            auth.sendOTP(userData.email, userData.phone, method);
            
            // Redirect to verification page
            setTimeout(() => {
                window.location.href = 'verify-otp.html';
            }, 1000);
            
            return false;
        }
    </script>
</body>
</html>
